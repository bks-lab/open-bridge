<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    /* ═══════════════════════════════════════════
       Bridge Dashboard - Self-Contained CSS
       ═══════════════════════════════════════════ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-gradient: #1a1a3e;
      --card-bg: rgba(22, 33, 62, 0.7);
      --card-border: rgba(15, 52, 96, 0.5);
      --card-hover: rgba(79, 195, 247, 0.5);
      --text-primary: #e0e0e0;
      --text-secondary: #90a4ae;
      --text-muted: #78909c;
      --text-heading: #ffffff;
      --accent-blue: #4fc3f7;
      --accent-green: #81c784;
      --accent-red: #ef5350;
      --accent-amber: #ffb74d;
      --accent-grey: #9e9e9e;
      --divider: rgba(255, 255, 255, 0.08);
      --divider-light: rgba(255, 255, 255, 0.04);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    body {
      background: var(--bg-primary);
      background-image: radial-gradient(ellipse at top, var(--bg-gradient) 0%, var(--bg-primary) 70%);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.5;
      padding: 20px 24px;
      min-height: 100vh;
      min-width: 400px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────── */

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--divider);
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-heading);
      letter-spacing: -0.5px;
    }

    .header-badge {
      font-size: 0.65rem;
      color: var(--accent-blue);
      background: rgba(79, 195, 247, 0.1);
      border: 1px solid rgba(79, 195, 247, 0.2);
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-time {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* ── Summary Bar ────────────────────────── */

    .summary-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: rgba(22, 33, 62, 0.4);
      border: 1px solid var(--divider);
      border-radius: var(--radius-md);
    }

    .summary-stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .summary-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-heading);
    }

    .summary-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-divider {
      width: 1px;
      background: var(--divider);
      align-self: stretch;
    }

    /* ── Projects Grid ──────────────────────── */

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    /* ── Project Card ───────────────────────── */

    .project-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .project-card:hover {
      border-color: var(--card-hover);
      box-shadow: 0 4px 24px rgba(79, 195, 247, 0.06);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-heading);
      letter-spacing: -0.3px;
    }

    .card-stats {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .card-stats .stat-highlight {
      color: var(--accent-blue);
      font-weight: 600;
    }

    /* ── Card Sections ──────────────────────── */

    .card-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--divider-light);
    }

    .section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider-light);
    }

    /* ── Tasks ──────────────────────────────── */

    .tasks {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task {
      display: grid;
      grid-template-columns: 52px 1fr auto 72px;
      gap: 8px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      align-items: center;
      transition: background 0.15s ease;
    }

    .task:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .task:nth-child(odd) {
      background: rgba(255, 255, 255, 0.02);
    }

    .task:nth-child(odd):hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .task-id {
      color: var(--text-muted);
      text-align: right;
      font-size: 0.7rem;
    }

    .task-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
    }

    .task-status {
      text-align: right;
      font-size: 0.7rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .task-assignee {
      text-align: right;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Status colors */
    .task[data-status="in-progress"] .task-status { color: var(--accent-blue); }
    .task[data-status="ready"] .task-status,
    .task[data-status="new"] .task-status { color: var(--accent-green); }
    .task[data-status="review"] .task-status { color: var(--accent-amber); }
    .task[data-status="backlog"] .task-status { color: var(--accent-grey); }
    .task[data-status="blocked"] .task-status { color: var(--accent-red); }

    /* Status indicator dot */
    .task-status::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .task[data-status="in-progress"] .task-status::before { background: var(--accent-blue); box-shadow: 0 0 6px var(--accent-blue); }
    .task[data-status="ready"] .task-status::before,
    .task[data-status="new"] .task-status::before { background: var(--accent-green); }
    .task[data-status="review"] .task-status::before { background: var(--accent-amber); box-shadow: 0 0 6px var(--accent-amber); }
    .task[data-status="backlog"] .task-status::before { background: var(--accent-grey); }
    .task[data-status="blocked"] .task-status::before { background: var(--accent-red); box-shadow: 0 0 4px var(--accent-red); }

    /* Backlog toggle */
    .backlog-toggle {
      padding: 4px 8px;
      margin-top: 4px;
      font-size: 0.7rem;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: var(--font-mono);
      transition: color 0.2s;
    }

    .backlog-toggle:hover {
      color: var(--accent-blue);
    }

    .backlog-tasks {
      display: none;
      flex-direction: column;
      gap: 2px;
    }

    .backlog-tasks.expanded {
      display: flex;
    }

    /* ── Git Activity ───────────────────────── */

    .git-activity {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .repo-sparkline {
      display: grid;
      grid-template-columns: 100px 100px 80px auto;
      gap: 8px;
      align-items: center;
      padding: 3px 0;
    }

    .repo-name {
      color: var(--accent-blue);
      font-weight: 500;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .branch {
      color: var(--text-muted);
      font-size: 0.65rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .branch::before {
      content: '\2387 ';
      opacity: 0.6;
    }

    .sparkline {
      height: 20px;
      width: 80px;
      display: block;
    }

    .sparkline-bar {
      fill: var(--accent-blue);
      opacity: 0.6;
      transition: opacity 0.2s ease, fill 0.2s ease;
    }

    .sparkline-bar:hover {
      opacity: 1;
      fill: #81d4fa;
    }

    .commit-count {
      color: var(--text-muted);
      font-size: 0.65rem;
      text-align: right;
      white-space: nowrap;
    }

    /* ── Deployments ────────────────────────── */

    .deployments {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .deploy-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      align-items: center;
      font-size: 0.75rem;
    }

    .deploy-name {
      color: var(--text-primary);
    }

    .deploy-status {
      font-weight: 600;
      font-size: 0.7rem;
      padding: 1px 8px;
      border-radius: 10px;
    }

    .deploy-ok .deploy-status {
      color: var(--accent-green);
      background: rgba(129, 199, 132, 0.1);
      border: 1px solid rgba(129, 199, 132, 0.2);
    }

    .deploy-error .deploy-status {
      color: var(--accent-red);
      background: rgba(239, 83, 80, 0.1);
      border: 1px solid rgba(239, 83, 80, 0.2);
      animation: pulse-error 2s ease-in-out infinite;
    }

    .deploy-pending .deploy-status {
      color: var(--accent-amber);
      background: rgba(255, 183, 77, 0.1);
      border: 1px solid rgba(255, 183, 77, 0.2);
    }

    @keyframes pulse-error {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .deploy-time {
      color: var(--text-muted);
      font-size: 0.65rem;
    }

    /* ── Footer ─────────────────────────────── */

    footer {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.65rem;
    }

    .footer-hint {
      opacity: 0.5;
    }

    /* ── Scrollbar ──────────────────────────── */

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ── No Data State ──────────────────────── */

    .no-data {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.75rem;
      padding: 8px;
    }

    /* ── Loading shimmer ────────────────────── */

    @keyframes shimmer {
      0% { background-position: -200px 0; }
      100% { background-position: 200px 0; }
    }

    .loading-placeholder {
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200px 100%;
      animation: shimmer 1.5s infinite;
    }
  </style>
</head>
<body>

  <!-- ═══ Header ═══ -->
  <header>
    <div class="header-left">
      <h1>{{TITLE}}</h1>
      <span class="header-badge">live</span>
    </div>
    <time class="header-time" datetime="{{TIMESTAMP}}">{{TIMESTAMP}}</time>
  </header>

  <!-- ═══ Summary Bar ═══ -->
  <div class="summary-bar">
    {{SUMMARY_HTML}}
  </div>

  <!-- ═══ Projects ═══ -->
  <main class="projects-grid">
    {{PROJECTS_HTML}}
  </main>

  <!-- ═══ Footer ═══ -->
  <footer>
    <span>{{ORG_NAME}} Dashboard</span>
    <span class="footer-hint">Generated by /dashboard</span>
  </footer>

  <!-- ═══ JavaScript ═══ -->
  <script>
    /* ── Sparkline Renderer ──────────────────
       Reads data-values="1,3,5,7,5,3,2" and renders SVG bar chart */
    document.querySelectorAll('.sparkline[data-values]').forEach(svg => {
      const raw = svg.getAttribute('data-values');
      if (!raw) return;
      const vals = raw.split(',').map(Number).filter(n => !isNaN(n));
      if (!vals.length) return;

      const w = 80, h = 20, gap = 1;
      const max = Math.max(...vals, 1);
      const barW = Math.max(1, (w - gap * (vals.length - 1)) / vals.length);

      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      svg.innerHTML = vals.map((v, i) => {
        const barH = Math.max(1, (v / max) * (h - 2));
        const x = i * (barW + gap);
        const y = h - barH;
        return `<rect class="sparkline-bar" x="${x}" y="${y}" width="${barW}" height="${barH}" rx="1">` +
               `<title>${v} commit${v !== 1 ? 's' : ''}</title></rect>`;
      }).join('');
    });

    /* ── Relative Time ───────────────────────
       Converts ISO timestamps to "2h ago" style */
    document.querySelectorAll('[data-timestamp]').forEach(el => {
      const ts = new Date(el.getAttribute('data-timestamp'));
      if (isNaN(ts)) return;
      const diff = Date.now() - ts.getTime();
      const mins = Math.floor(diff / 60000);
      const hrs = Math.floor(mins / 60);
      const days = Math.floor(hrs / 24);

      let text;
      if (mins < 1) text = 'gerade eben';
      else if (mins < 60) text = `vor ${mins}m`;
      else if (hrs < 24) text = `vor ${hrs}h`;
      else if (days < 7) text = `vor ${days}d`;
      else text = ts.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });

      el.textContent = text;
    });

    /* ── Backlog Toggle ──────────────────────
       Click "+ N weitere" to expand/collapse */
    document.querySelectorAll('.backlog-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.parentElement.querySelector('.backlog-tasks');
        if (!target) return;
        const expanded = target.classList.toggle('expanded');
        const count = target.children.length;
        btn.textContent = expanded ? `\u25B4 ${count} ausblenden` : `\u25BE + ${count} weitere`;
      });
    });
  </script>

</body>
</html>
