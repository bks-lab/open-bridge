# Proposal File Frontmatter Schema — JSON Schema Draft 2020-12 in YAML
#
# Validates the YAML frontmatter of work/_learning/proposals/*.md.
# The markdown body below the frontmatter is free-form (see proposal-writing.md).
#
# Validation pattern:
#   extract-frontmatter <proposal>.md | check-jsonschema --schemafile _schema.proposal.yaml -
#
# Related:
#   - skills/task-close-postmortem/references/proposal-writing.md (style guide)
#   - skills/bridge-learn/ (Phase 2 — reviews proposals using this schema)
#   - work/_learning/audit-trail.md (logs status transitions)

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://bks-lab.github.io/open-bridge/schemas/learning-proposal.yaml"
title: LearningProposal
description: |
  One candidate improvement to a Bridge file (skill, standing-order, rule,
  doc, protocol, memory, schema). Generated at task close by the
  task-close-postmortem skill (Phase 1) or by /bridge-audit recurring-finding
  detection (Phase 3). Reviewed and accepted/rejected via /bridge-learn (Phase 2).

type: object
required: [id, created, source, severity, status, scope, target, proposal_type]
additionalProperties: false

properties:

  id:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}-[a-z0-9-]+-[a-z0-9-]+$"
    description: "Filename without .md — '<YYYY-MM-DD>-<task-slug>-<topic-slug>'"

  created:
    type: string
    format: date

  source:
    type: object
    required: [type, evidence]
    additionalProperties: false
    properties:
      type:
        enum: [postmortem, audit-recurring, trigger-correction, manual, curator-suggestion]
        description: |
          postmortem: from task-close-postmortem skill
          audit-recurring: from /bridge-audit Phase-3 trend detection
          trigger-correction: from work/_learning/trigger-corrections.md
          manual: user wrote it directly via /bridge-learn
          curator-suggestion: from bridge-curator weekly consolidation pass
            (Library / Queue / User-Pattern phases — see skills/bridge-curator/)
      task_slug:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
        description: "The closing task's slug — only set when source.type=postmortem"
      evidence:
        type: array
        minItems: 1
        items: {type: string}
        description: |
          Repo-relative path pointers (with optional #anchor) showing where
          this proposal came from. Min 1, no http URLs.

  severity:
    enum: [P0, P1, P2, P3]
    description: |
      P0 = immediate-action; reserved for recurring critical audit findings.
      P1 = active impact described; touch within sprint.
      P2 = default for postmortem-sourced.
      P3 = nice-to-have / unmapped / triage-needed.

  status:
    enum: [pending, accepted, rejected, deferred, implemented, superseded]
    default: pending
    description: |
      Lifecycle:
        pending → accepted (diff applied, commit on user/) → implemented
        pending → rejected (with reason logged in audit-trail.md)
        pending → deferred (later via /bridge-learn)
        pending → superseded (newer proposal covers same target)
      Transitions are logged in work/_learning/audit-trail.md.
      task-close-postmortem ONLY writes 'pending'.

  scope:
    enum: [core, org, user]
    description: |
      Routing tag for /bridge-sync scope-based promotion.
      core → /bridge-sync to your org overlay AND open-bridge (OSS, strict scrub)
      org  → /bridge-sync to your org overlay only
      user → stays local on user/<name>, never pushed upstream

  target:
    type: object
    required: [type, action]
    additionalProperties: false
    properties:
      type:
        enum: [skill, standing_order, rule, doc, protocol, memory, schema, config]
      path:
        type: string
        description: |
          Repo-relative path. Use the path that WILL exist after action=create.
          For action=delete: path of the file to remove.
          For action=rename: path of the current name (new name in body).
      action:
        enum: [create, edit, delete, rename]

  proposal_type:
    enum: [structured, needs-triage]
    description: |
      structured: came from bridge_gaps[] or maps cleanly to a target file.
      needs-triage: came from free-text Q6 without clean target mapping;
                    needs human triage before it's reviewable.

  # ---- Optional fields ----

  diff_preview:
    type: string
    description: |
      Optional concrete patch preview as Markdown-fenced text or unified-diff.
      Helps /bridge-learn review go faster. Omit if patch is non-trivial
      (large new file, structural refactor) — review will read body instead.

  estimated_effort:
    enum: ["<15min", "1h", "half-day", "1d", "multi-day"]
    description: "Optional. Inferred or postmortem-derived effort to implement."

  related:
    type: array
    items: {type: string}
    description: "Optional pointers to related proposals, MEMORY entries, audit findings."

  superseded_by:
    type: string
    description: "If status=superseded: the id of the proposal that replaces this."

# Notes (advisory):
# - additionalProperties:false is strict on purpose — /bridge-learn reads
#   this programmatically. Domain-specific extensions need a schema bump.
# - severity enum is the same as /bridge-audit (P0-P3) — keeps stratification
#   consistent across both signal sources.
# - The `evidence` array is the audit trail of WHY this proposal exists.
#   Empty evidence = invented proposal = reject by default.
