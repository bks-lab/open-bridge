name: Release

# Cut a GitHub release from a SemVer tag (v*). The tag must have a matching
# `## [X.Y.Z]` entry in CHANGELOG.md (Keep a Changelog); that section becomes
# the release notes. Full validation suite runs first via validate.yml
# (workflow_call) so a release can never ship with red checks.
#
# Maintainer runbook: docs/releasing.md

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validation Suite
    # Reuse the exact PR/push checks — yamllint, ecosystem, schemas,
    # content-leak, skill-scope, frontmatter.
    uses: ./.github/workflows/validate.yml

  changelog-check:
    name: CHANGELOG Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag has a CHANGELOG entry and extract release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '${TAG}' is not a SemVer tag (expected vX.Y.Z)."
            exit 1
          fi

          if ! grep -qE "^## \[${VERSION//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' entry for tag '${TAG}'."
            echo "Add the section to CHANGELOG.md, commit, then re-tag. See docs/releasing.md."
            exit 1
          fi

          # Extract the section body: from the matching '## [X.Y.Z]' heading
          # (exclusive) to the next '## [' heading (exclusive).
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" ver "]") == 1) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          echo "Release notes for ${TAG}:"
          echo "---"
          cat release-notes.md
          echo "---"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [validate, changelog-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + tag association
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          # 0.x = public preview, no stability guarantees (see CHANGELOG.md).
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
