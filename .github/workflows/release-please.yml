name: Release Please

# Conventional-commit-driven releases. On every push to main, release-please
# reads the merged commit subjects (squash-merge uses the PR title, so PR
# titles must be conventional) and maintains a single open "release" PR that:
#   - computes the next SemVer version from the commit types
#     (fix: -> patch, feat: -> minor, breaking -> minor while in 0.x), and
#   - assembles the CHANGELOG section for that version.
# Merging that PR creates the git tag and the GitHub release. The release PR
# is a normal PR, so the full validation suite (validate.yml) + DCO run on it
# and branch protection blocks the merge while red — the merge is the gate.
#
# Version rules: release-please-config.json  ·  baseline: .release-please-manifest.json
# Maintainer runbook: docs/releasing.md

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # create the tag + GitHub release on release-PR merge
  pull-requests: write   # open / update the rolling release PR

jobs:
  release-please:
    name: Release PR + GitHub Release
    runs-on: ubuntu-latest
    steps:
      # GitHub will not run CI on a PR opened by the built-in GITHUB_TOKEN, so
      # the release PR must be opened by a GitHub App token. Configure the repo
      # variable RP_APP_ID + secret RP_APP_PRIVATE_KEY (see docs/releasing.md).
      # Until those exist this step is skipped and the job falls back to
      # GITHUB_TOKEN — the release PR is still created, but its checks won't run
      # automatically (close + reopen it once to trigger them).
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.RP_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RP_APP_ID }}
          private-key: ${{ secrets.RP_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # GitHub marks a release as "Latest" unless the version string is itself a
      # SemVer prerelease. The 0.x series is public preview, so flag those
      # releases as pre-release explicitly.
      - name: Mark 0.x release as pre-release
        if: ${{ steps.release.outputs.release_created && startsWith(steps.release.outputs.tag_name, 'v0.') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --prerelease --repo "${{ github.repository }}"
